<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everest · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F1EC;--surface:#FDFCFA;--surface2:#EFECE5;--border:#DDD9CF;--border-soft:#E8E4DB;
  --text-primary:#1C1917;--text-secondary:#78716C;--text-muted:#A8A29E;
  --accent:#1C3B5A;
  --c-bantotal:#1C3B5A;--c-bantotal-bg:#E8EFF6;
  --c-modelos:#3D5A3E;--c-modelos-bg:#EAF0EA;
  --c-fps:#6B3A2A;--c-fps-bg:#F5EDE9;
  --c-soc:#3A2D6B;--c-soc-bg:#EEEAF5;
  --c-gap:#5A3A1C;--c-gap-bg:#F5EDEA;
  --c-ey:#1C5A45;--c-ey-bg:#E8F5EF;
  --c-retail:#5A1C3B;--c-retail-bg:#F5E8EF;
  --t-pendiente:#C0392B;--t-pendiente-bg:#FDECEA;
  --t-seguimiento:#B7770D;--t-seguimiento-bg:#FEF8E7;
  --t-decision:#1C3B5A;--t-decision-bg:#E8EFF6;
  --t-info:#78716C;--t-info-bg:#EFECE5;
  --t-pausado:#A8A29E;--t-pausado-bg:#F4F1EC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:13px}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--accent);padding:1.5rem 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-brand{padding:0 1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:.5rem}
.sidebar-ev{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:-.5px;line-height:1}
.sidebar-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.nav-section{padding:.375rem 1.25rem .25rem;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600;margin-top:.5rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 1.25rem;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;border-left-color:#A8C5E0;background:rgba(255,255,255,.1);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.4)}
.nav-item.active .nav-count{color:rgba(255,255,255,.7)}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem 0;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-date{font-size:10px;color:rgba(255,255,255,.35);line-height:1.6}
.sync-row{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.4);margin-top:5px}
.pulse{width:5px;height:5px;border-radius:50%;background:#5EEAD4;flex-shrink:0}
.pulse.on{animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.main{padding:2rem 2.5rem;overflow-x:hidden}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;gap:1rem}
.page-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:1.1}
.page-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
.topbar-actions{display:flex;gap:7px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-primary);cursor:pointer;white-space:nowrap;transition:all .12s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-dark{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-dark:hover{background:#162E48}
.btn-green{background:#EAF5EF;color:#1C5A45;border-color:#B6DFC8}
.btn-green:hover{background:#D5EDDF}
.btn-warn{background:#FEF8E7;color:#B7770D;border-color:#F0DFA0}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.75rem}
.metric{background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .12s,transform .1s}
.metric:hover{border-color:var(--border);transform:translateY(-1px)}
.metric-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;font-weight:500}
.metric-val{font-family:'DM Serif Display',serif;font-size:32px;line-height:1}
.metric-sub{font-size:10px;color:var(--text-muted);margin-top:4px}
.m-pend .metric-val{color:var(--t-pendiente)}
.m-seg  .metric-val{color:var(--t-seguimiento)}
.m-dec  .metric-val{color:var(--t-decision)}
.m-done .metric-val{color:#3D5A3E}
.banner{display:none;align-items:center;gap:8px;font-size:11px;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;padding:8px 12px;margin-bottom:1rem}
.banner.err{background:#FDECEA;border-color:#F5B7B1;color:var(--t-pendiente)}
.banner.ok{background:#EAF5EF;border-color:#B6DFC8;color:#1C5A45}
.banner.show{display:flex}
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted)}
.search-box{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px 7px 32px;border:1px solid var(--border-soft);border-radius:6px;background:var(--surface);color:var(--text-primary)}
.search-box:focus{outline:none;border-color:var(--border)}
.fsel{font-family:'DM Sans',sans-serif;font-size:11px;padding:6px 10px;border:1px solid var(--border-soft);border-radius:6px;background:var(--surface);color:var(--text-secondary);cursor:pointer}
.item-grid{display:flex;flex-direction:column;gap:6px}
.icard{background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:12px 15px;cursor:pointer;transition:border-color .12s,box-shadow .12s;display:grid;grid-template-columns:22px 1fr auto;gap:10px;align-items:start;position:relative}
.icard:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.icard.t-pendiente{border-left:3px solid var(--t-pendiente)}
.icard.t-seguimiento{border-left:3px solid var(--t-seguimiento)}
.icard.t-decision{border-left:3px solid var(--t-decision)}
.icard.t-info,.icard.t-pausado{border-left:3px solid var(--border)}
.icard.is-done{opacity:.4;border-left-color:var(--border)!important}
.src-tag{position:absolute;top:8px;right:8px;font-size:9px;font-family:'DM Mono',monospace;border-radius:4px;padding:1px 5px}
.src-gmail{color:#4285f4;background:#EEF4FF}
.src-jira{color:#0052CC;background:#E9F0FF}
.icheck{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);transition:all .1s;flex-shrink:0;margin-top:1px}
.icheck:hover{border-color:var(--text-secondary)}
.icheck.checked{background:#EAF0EA;border-color:#3D5A3E}
.icard-body{min-width:0;padding-right:48px}
.ititle{font-size:13px;font-weight:500;color:var(--text-primary);line-height:1.4;margin-bottom:6px}
.ititle.done{text-decoration:line-through;color:var(--text-muted)}
.imeta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.inote{font-size:11px;color:var(--text-secondary);margin-top:6px;line-height:1.5;padding-top:6px;border-top:1px solid var(--border-soft)}
.ireunion{font-size:10px;color:var(--text-muted);margin-top:4px;font-style:italic}
.iright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.src-gemini{color:#7C3AED;background:#F3EEFF}
.imeetings{font-size:10.5px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border-soft);display:flex;flex-direction:column;gap:3px}
.imeet-row{color:var(--text-muted);line-height:1.5}
.imeet-lbl{font-weight:600;color:var(--text-secondary)}
.imeet-notes{color:var(--text-muted);font-style:italic;font-size:10px;line-height:1.4;margin-top:1px}
.imeet-acts{margin-top:4px;display:flex;flex-direction:column;gap:2px}
.imeet-act{font-size:10.5px;color:var(--t-pendiente);line-height:1.4;padding-left:14px;position:relative}
.imeet-act::before{content:'✏';position:absolute;left:0;font-size:9px;top:1px}
.idue{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);padding:2px 6px;border-radius:4px;background:var(--surface2);white-space:nowrap}
.idue.ov{color:var(--t-pendiente);background:var(--t-pendiente-bg);font-weight:500}
.idue.soon{color:var(--t-seguimiento);background:var(--t-seguimiento-bg);font-weight:500}
.iassign{font-size:10px;color:var(--text-muted);text-align:right;max-width:130px;line-height:1.3}
.sec-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin:1.25rem 0 .5rem;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border-soft)}
.group-hdr{display:flex;align-items:center;gap:10px;margin:1.5rem 0 .625rem;padding-bottom:.5rem;border-bottom:1px solid var(--border-soft)}
.group-hdr:first-child{margin-top:0}
.group-name{font-family:'DM Serif Display',serif;font-size:15px;font-weight:400}
.group-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--surface2);border-radius:10px;padding:1px 7px}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:.75rem}
.done-info{font-size:11px;color:var(--text-muted);background:var(--surface2);border-radius:8px;padding:9px 13px;margin-bottom:1rem;border:1px solid var(--border-soft);line-height:1.6}
.view{display:none}.view.active{display:block}
.sync-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.sync-meta{font-size:11px;color:var(--text-muted)}
.modal-bd{display:none;position:fixed;inset:0;background:rgba(28,25,23,.4);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bd.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;width:560px;max-width:96%;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.15)}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:1.25rem}
.frow{margin-bottom:12px}
.flbl{font-size:10px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.finput,.fsel,.ftarea{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 11px;border:1px solid var(--border-soft);border-radius:7px;background:var(--bg);color:var(--text-primary)}
.finput:focus,.fsel:focus,.ftarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.ftarea{min-height:72px;resize:vertical}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border-soft)}
.btn-del{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--t-pendiente);padding:7px 12px;border-radius:6px;border:1px solid #FDECEA;background:none;cursor:pointer;margin-right:auto}
.btn-del:hover{background:var(--t-pendiente-bg)}
.spinner{width:11px;height:11px;border:2px solid rgba(0,0,0,.15);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.shell{grid-template-columns:1fr}.sidebar{display:none}.metrics{grid-template-columns:1fr 1fr}.fgrid2,.fgrid3{grid-template-columns:1fr}}
/* ── Modal meeting panel ── */
.mpanel{background:#F8F6FF;border:1px solid #DDD5FF;border-radius:9px;padding:10px 13px;margin-top:8px}
.mpanel-hdr{font-size:10px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.mpanel-next{background:var(--t-seguimiento-bg);border:1px solid #F0DFA0;border-radius:6px;padding:6px 9px;margin-bottom:6px;font-size:11px;color:var(--t-seguimiento)}
.mpanel-entry{border-top:1px solid #EDE8FF;padding:7px 0 4px}
.mpanel-entry:first-of-type{border-top:none}
.mpanel-title{font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:2px}
.mpanel-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-right:6px}
.mpanel-notes{font-size:10.5px;color:var(--text-secondary);font-style:italic;margin-bottom:4px;line-height:1.45}
.mpanel-acts{margin-bottom:5px}
.mpanel-act{font-size:10.5px;color:var(--t-pendiente);line-height:1.4;padding-left:14px;position:relative;margin-bottom:1px}
.mpanel-act::before{content:'✏';position:absolute;left:0;font-size:9px;top:1px}
.mpanel-apply{font-size:10px;font-weight:500;padding:3px 10px;border-radius:4px;border:1px solid #C4B5FD;background:#EDE9FE;color:#6D28D9;cursor:pointer;transition:all .12s}
.mpanel-apply:hover{background:#6D28D9;color:#fff;border-color:#6D28D9}
.mpanel-empty{font-size:11px;color:var(--text-muted);text-align:center;padding:6px 0}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-ev">Everest</div>
    <div class="sidebar-sub">Gestión Contable · BCRA</div>
  </div>
  <span class="nav-section">Vistas</span>
  <a class="nav-item active" onclick="goView('pendientes',this)"><span class="nav-dot" style="background:#C0392B"></span>Mis pendientes<span class="nav-count" id="nc-p">0</span></a>
  <a class="nav-item" onclick="goView('seguimiento',this)"><span class="nav-dot" style="background:#B7770D"></span>En seguimiento<span class="nav-count" id="nc-s">0</span></a>
  <a class="nav-item" onclick="goView('decisiones',this)"><span class="nav-dot" style="background:#1C3B5A"></span>Decisiones abiertas<span class="nav-count" id="nc-d">0</span></a>
  <span class="nav-section" style="margin-top:.75rem">Fuentes</span>
  <a class="nav-item" onclick="goView('gmail',this)"><span class="nav-dot" style="background:#4285f4"></span>Gmail + Minutas<span class="nav-count" id="nc-g">0</span></a>
  <a class="nav-item" onclick="goView('jira',this)"><span class="nav-dot" style="background:#0052CC"></span>Jira · EVEREST<span class="nav-count" id="nc-j">0</span></a>
  <span class="nav-section" style="margin-top:.75rem">Organización</span>
  <a class="nav-item" onclick="goView('sistemas',this)"><span class="nav-dot" style="background:#A8A29E"></span>Por sistema<span class="nav-count" id="nc-sys">0</span></a>
  <a class="nav-item" onclick="goView('completados',this)"><span class="nav-dot" style="background:#3D5A3E"></span>Completados<span class="nav-count" id="nc-done">0</span></a>
  <span class="nav-section" style="margin-top:.75rem">Agenda</span>
  <a class="nav-item" onclick="goView('agenda',this)"><span class="nav-dot" style="background:#B7770D"></span>Hoy &amp; mañana<span class="nav-count" id="nc-cal">0</span></a>
  <div class="sidebar-footer">
    <div class="sidebar-date" id="sdate"></div>
    <div class="sync-row"><span class="pulse" id="spulse"></span><span id="stext">Listo</span></div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="ptitle">Mis pendientes</div>
      <div class="page-sub" id="psub">To-dos asignados a Lu</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-dark" onclick="openModal()">+ Nuevo</button>
    </div>
  </div>
  <div id="banner" class="banner"></div>
  <div class="metrics" id="mrow"></div>
  <div id="view-pendientes"  class="view active"></div>
  <div id="view-seguimiento" class="view"></div>
  <div id="view-decisiones"  class="view"></div>
  <div id="view-gmail"       class="view"></div>
  <div id="view-jira"        class="view"></div>
  <div id="view-sistemas"    class="view"></div>
  <div id="view-completados" class="view"></div>
  <div id="view-agenda"      class="view"></div>
</main>
</div>

<div class="modal-bd" id="mbd" onclick="closeBd(event)">
  <div class="modal">
    <div class="modal-title" id="mtitle">Nuevo ítem</div>
    <div class="frow"><label class="flbl">Descripción</label><input class="finput" id="f-desc" placeholder="¿Qué hay que hacer o seguir?"></div>
    <div class="fgrid2">
      <div class="frow"><label class="flbl">Sistema</label><select class="fsel" id="f-label" onchange="onLbl()"></select></div>
      <div class="frow"><label class="flbl">Sub-label</label><select class="fsel" id="f-sub" onchange="updateMeetingPanel()"><option value="">—</option></select></div>
    </div>
    <div class="fgrid3">
      <div class="frow"><label class="flbl">Tipo</label><select class="fsel" id="f-tipo"><option value="pendiente">Pendiente mío</option><option value="seguimiento">Seguimiento</option><option value="decision">Decisión abierta</option><option value="info">Informativo</option><option value="pausado">Pausado</option></select></div>
      <div class="frow"><label class="flbl">Estado</label><select class="fsel" id="f-done"><option value="0">Activo</option><option value="1">Completado ✓</option></select></div>
      <div class="frow"><label class="flbl">Fecha límite</label><input class="finput" type="date" id="f-due"></div>
    </div>
    <div class="fgrid2">
      <div class="frow"><label class="flbl">Contraparte</label><input class="finput" id="f-who" placeholder="IT, Tax, FPS, EY..."></div>
      <div class="frow"><label class="flbl">Reunión de origen</label><input class="finput" id="f-reunion"></div>
    </div>
    <div class="frow"><label class="flbl">Nota</label><textarea class="ftarea" id="f-note"></textarea></div>
    <div id="meet-panel" class="mpanel" style="display:none">
      <div class="mpanel-hdr">🟣 Minutas relacionadas <span id="mpanel-badge" style="font-size:9px;background:#7C3AED;color:#fff;border-radius:10px;padding:1px 6px;font-weight:600"></span></div>
      <div id="mpanel-content"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="bdel" style="display:none" onclick="delItem()">Eliminar</button>
      <button class="btn" onclick="closeMod()">Cancelar</button>
      <button class="btn btn-dark" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const LU = 'lujan.usieto@mercadolibre.com';
const CLOUD_ID = 'mercadolibre-everest.atlassian.net';
const JIRA_BASE = 'https://mercadolibre-everest.atlassian.net/browse/';

const LABELS = [
  {id:'bantotal', label:'Bantotal',             color:'var(--c-bantotal)', bg:'var(--c-bantotal-bg)', subs:['Integración SAP','Módulos pendientes','COELSA','Conciliaciones bancarias','Pago de impuestos','Descubierto']},
  {id:'modelos',  label:'Modelos Contables',    color:'var(--c-modelos)',  bg:'var(--c-modelos-bg)',  subs:['ON y VDF','Repos','Cauciones','Títulos Públicos','Plazos Fijos','Call','Depósitos Remunerados','Nostro Remuneradas','FX Spot','Descuento de Cupones','Compra de Cartera']},
  {id:'fps',      label:'FPS + FinOps + Acc',   color:'var(--c-fps)',      bg:'var(--c-fps-bg)',      subs:['Conciliaciones Bancarias','AxI','Diferencia de Cotización','DE-PARA','Plan de cuentas']},
  {id:'societario',label:'Societario',          color:'var(--c-soc)',      bg:'var(--c-soc-bg)',      subs:['Constitución','Capital','SAP acelerado']},
  {id:'gap',      label:'GAP Normativo / PwC',  color:'var(--c-gap)',      bg:'var(--c-gap-bg)',      subs:[]},
  {id:'ey',       label:'Auditoría / EY',        color:'var(--c-ey)',       bg:'var(--c-ey-bg)',       subs:[]},
  {id:'retail',   label:'Banco Retail',          color:'var(--c-retail)',   bg:'var(--c-retail-bg)',   subs:[]},

function load(){
  try{
    const s=localStorage.getItem('ev7_items'); items=s?JSON.parse(s):DEFAULTS.map(x=>({...x}));
    const n=localStorage.getItem('ev7_nid'); if(n)nid=parseInt(n);
    const gs=localStorage.getItem('ev7_gsync'); if(gs)lastGsync=gs;
    const js=localStorage.getItem('ev7_jsync'); if(js)lastJsync=js;
  }catch(e){items=DEFAULTS.map(x=>({...x}));}
  // Inyección automática de Gmail — usa desc como clave estable para preservar tildados
  if(SCHEDULED_GMAIL_ITEMS&&SCHEDULED_GMAIL_ITEMS.length){
    const prevGmail=new Map(items.filter(i=>i.source==='gmail').map(i=>[i.desc,i]));
    items=items.filter(i=>i.source!=='gmail');
    SCHEDULED_GMAIL_ITEMS.forEach(ni=>{
      const prev=prevGmail.get(ni.desc);
      items.push({...ni,done:prev?prev.done:ni.done});
    });
    if(SCHEDULED_GSYNC)lastGsync=SCHEDULED_GSYNC;
    save();
  }
  // Inyección automática de Jira — usa jiraKey como clave estable para preservar tildados
  if(SCHEDULED_JIRA_ITEMS&&SCHEDULED_JIRA_ITEMS.length){
    const prevJira=new Map(items.filter(i=>i.source==='jira').map(i=>[i.jiraKey,i]));
    items=items.filter(i=>i.source!=='jira');
    SCHEDULED_JIRA_ITEMS.forEach(ni=>{
      const prev=prevJira.get(ni.jiraKey);
      const done=prev?prev.done:isJiraDone(ni.jiraStatus||'');
      items.push({...ni,done});
    });
    if(SCHEDULED_JSYNC)lastJsync=SCHEDULED_JSYNC;
    save();
  }
  // Inyección Gemini (minutas) — usa desc como clave estable para preservar tildados
  if(SCHEDULED_GEMINI_ITEMS&&SCHEDULED_GEMINI_ITEMS.length){
    const prevGemini=new Map(items.filter(i=>i.source==='gemini').map(i=>[i.desc,i]));
    items=items.filter(i=>i.source!=='gemini');
    SCHEDULED_GEMINI_ITEMS.forEach(ni=>{
      const prev=prevGemini.get(ni.desc);
      items.push({...ni,done:prev?prev.done:ni.done});
    });
    save();
  }
}
function save(){
  try{
    localStorage.setItem('ev7_items',JSON.stringify(items));
    localStorage.setItem('ev7_nid',String(nid));
    if(lastGsync)localStorage.setItem('ev7_gsync',lastGsync);
    if(lastJsync)localStorage.setItem('ev7_jsync',lastJsync);
  }catch(e){}
}

function lm(id){return LABELS.find(l=>l.id===id)||LABELS[0];}
function tc(t){return TIPO[t]||TIPO.info;}
function dc(due,done){if(done||!due)return '';const d=new Date(due),n=new Date();n.setHours(0,0,0,0);d.setHours(0,0,0,0);const diff=(d-n)/86400000;return diff<0?'ov':diff<=4?'soon':'';}
function fd(s){if(!s)return '';const[y,m,d]=s.split('-');const ms=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return `${parseInt(d)} ${ms[parseInt(m)-1]}`;}
function filt(list){let r=list;if(sq)r=r.filter(i=>i.desc.toLowerCase().includes(sq)||(i.note||'').toLowerCase().includes(sq)||(i.who||'').toLowerCase().includes(sq));if(fl)r=r.filter(i=>i.label===fl);return r;}
function routeGmail(subj,snip,from){const t=`${subj} ${snip} ${from}`.toLowerCase();for(const r of ROUTES)if(r.p.test(t))return{label:r.label,sub:r.sub,tipo:r.tipo};return{label:'fps',sub:'',tipo:'info'};}
function isJiraDone(status){return JIRA_DONE_STATUSES.some(s=>status.toLowerCase().includes(s));}
function jiraLabel(summary){const t=summary.toLowerCase();if(/contabilidad|plan.?cuentas|mayor.?saldos|asientos/.test(t))return'bantotal';if(/batch|riesgos/.test(t))return'fps';if(/integraci[oó]n|sap/.test(t))return'bantotal';return'bantotal';}

async function syncGmail(){
  setSyncing('gmail',true);
  showBanner('Buscando emails nuevos en Gmail…','');
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`Sos el asistente de Lujan Usieto (${LU}), referente contable del Proyecto Everest, banco argentino regulado por BCRA.
Usá Gmail MCP para buscar threads relevantes de los últimos 30 días con estas queries:
- "Bantotal SAP BCRA contabilidad banco Argentina newer_than:30d"
- "AxI diferencia cotización FPS finops acc corp newer_than:30d"
- "EY PwC auditoría frente contable newer_than:30d"

Para cada thread devolvé SOLO un JSON array (sin markdown, sin texto):
[{"threadId":"...","subject":"...","from":"...","date":"DD MMM","snippet":"...","luReplied":true/false}]
luReplied=true si ${LU} aparece como sender en algún mensaje del thread.`,
        messages:[{role:'user',content:'Busca los emails y devuelve el JSON.'}],
        mcp_servers:[{type:'url',url:'https://gmailmcp.googleapis.com/mcp/v1',name:'gmail'}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const toolRes = (data.content||[]).filter(b=>b.type==='mcp_tool_result');
    let threads=[];
    try{const m=text.match(/\[[\s\S]*\]/);if(m)threads=JSON.parse(m[0]);}catch(e){}
    if(!threads.length){
      for(const tr of toolRes){try{const txt=tr.content?.[0]?.text||'';const m=txt.match(/\[[\s\S]*\]/);if(m){threads=JSON.parse(m[0]);break;}}catch(e){}}
    }
    if(threads.length){
      items=items.filter(i=>i.source!=='gmail');
      for(const t of threads){
        const r=routeGmail(t.subject||'',t.snippet||'',t.from||'');
        items.push({id:nid++,desc:t.subject||'Thread sin asunto',label:r.label,sub:r.sub,tipo:t.luReplied?'info':r.tipo,done:!!t.luReplied,due:null,who:t.from||null,note:t.snippet||null,reunion:null,source:'gmail',syncDate:t.date||null});
      }
      lastGsync=new Date().toLocaleString('es-AR');
      save();
      showBanner(`✓ ${threads.length} thread${threads.length!==1?'s':''} procesados · ${lastGsync}`,'ok');
    }else{
      showBanner('Sin emails nuevos relevantes en los últimos 30 días.','ok');
    }
  }catch(err){
    showBanner('Error conectando con Gmail MCP. Verificá la conexión en Claude Desktop.','err');
  }
  setSyncing('gmail',false);
  renderAll();
}

      })
    });
    const data=await res.json();

      }

      save();
      showBanner(`✓ ${issues.length} issue${issues.length!==1?'s':''} sincronizados · ${lastJsync}`,'ok');

// ── CARD ──────────────────────────────────────────────────────────────────────
function card(item){
  const l=lm(item.label),t=tc(item.tipo),d=dc(item.due,item.done);
  const tC=item.done?'':` t-${item.tipo}`;
  const dC=item.done?' is-done':'';
  const srcTag=item.source==='gmail'?'<span class="src-tag src-gmail">Gmail</span>':
    item.source==='jira'?`<span class="src-tag src-jira"><a href="${JIRA_BASE}${item.jiraKey||''}" target="_blank" style="color:inherit;text-decoration:none">${item.jiraKey||'Jira'} ↗</a></span>`:
    item.source==='gemini'?'<span class="src-tag src-gemini">Minutas</span>':'';

  // Meeting context — encontrar nota relacionada
  let meetingHtml='';
  if(!item.done){
    const relNotes=MEETING_NOTES.filter(m=>m.label===item.label)
      .sort((a,b)=>b.date.localeCompare(a.date));
    let primaryNote=null;
    if(item.reunion) primaryNote=MEETING_NOTES.find(m=>m.title===item.reunion)||relNotes[0];
    else if(item.sub) primaryNote=relNotes.find(m=>m.sub&&m.sub.toLowerCase().includes(item.sub.toLowerCase()))||relNotes[0];
    else primaryNote=relNotes[0];
    const todayStr=new Date().toISOString().slice(0,10);
    const nextEvt=CALENDAR_EVENTS.filter(e=>e.everest&&e.label===item.label&&e.date>=todayStr)
      .sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start))[0];
    if(primaryNote||nextEvt){
      const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      meetingHtml='<div class="imeetings">';
      if(primaryNote){
        const [,pm,pd]=primaryNote.date.split('-');
        meetingHtml+=`<div class="imeet-row"><span class="imeet-lbl">Última reunión:</span> ${parseInt(pd)} ${MS[parseInt(pm)-1]} — ${primaryNote.title}</div>`;
        if(primaryNote.keyNotes)meetingHtml+=`<div class="imeet-notes">${primaryNote.keyNotes.length>95?primaryNote.keyNotes.slice(0,95)+'…':primaryNote.keyNotes}</div>`;
        // Mostrar accionables solo para items NO gemini (los gemini YA son el accionable)
        if(item.source!=='gemini'&&primaryNote.luActions&&primaryNote.luActions.length){
          meetingHtml+=`<div class="imeet-acts">${primaryNote.luActions.slice(0,3).map(a=>`<div class="imeet-act">${a}</div>`).join('')}</div>`;
        }
      }
      if(nextEvt){
        const isToday=nextEvt.date===todayStr;
        meetingHtml+=`<div class="imeet-row" style="margin-top:3px"><span class="imeet-lbl">Próxima:</span> ${isToday?`Hoy ${nextEvt.start}`:nextEvt.date===new Date(Date.now()+86400000).toISOString().slice(0,10)?`Mañana ${nextEvt.start}`:nextEvt.date+' '+nextEvt.start} — ${nextEvt.title}</div>`;
      }
      meetingHtml+='</div>';
    }
  }

  return `<div class="icard${tC}${dC}" onclick="openEdit(${item.id})">
    ${srcTag}
    <div class="icheck ${item.done?'checked':''}" onclick="tog(event,${item.id})">
      ${item.done?`<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="#3D5A3E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
    </div>
    <div class="icard-body">
      <div class="ititle${item.done?' done':''}">${item.desc}</div>
      <div class="imeta">
        <span class="tag" style="color:${l.color};background:${l.bg}">${l.label}</span>
        ${item.sub?`<span class="tag" style="color:var(--text-secondary);background:var(--surface2)">${item.sub}</span>`:''}
        <span class="tag" style="color:${t.color};background:${t.bg}">${t.label}</span>
        ${item.syncDate?`<span class="tag" style="color:var(--text-muted);background:var(--surface2)">${item.syncDate}</span>`:''}
      </div>
      ${item.note?`<div class="inote">${item.note}</div>`:''}
      ${item.reunion&&item.source!=='gemini'?`<div class="ireunion">📅 ${item.reunion}</div>`:''}
      ${meetingHtml}
    </div>
    <div class="iright">
      ${item.due?`<div class="idue ${d}">${fd(item.due)}</div>`:''}
      ${item.who?`<div class="iassign">${item.who}</div>`:''}
    </div>
  </div>`;
}

    if(man.length)h+=`<div class="sec-label">Manuales</div><div class="item-grid">${man.map(card).join('')}</div>`;
    if(gm.length)h+=`<div class="sec-label" style="margin-top:1rem">Gmail — Lu respondió</div><div class="item-grid">${gm.map(card).join('')}</div>`;
    if(ge.length)h+=`<div class="sec-label" style="margin-top:1rem">Minutas Gemini — completados</div><div class="item-grid">${ge.map(card).join('')}</div>`;
    if(jr.length)h+=`<div class="sec-label" style="margin-top:1rem">Jira — Done</div><div class="item-grid">${jr.map(card).join('')}</div>`;
  }
  document.getElementById('view-completados').innerHTML=h;
}
function renderMetrics(){
  const a=items.filter(i=>!i.done);
  const p=a.filter(i=>i.tipo==='pendiente').length;
  const s=a.filter(i=>i.tipo==='seguimiento').length;
  const d=a.filter(i=>i.tipo==='decision').length;
  const dn=items.filter(i=>i.done).length;
  document.getElementById('mrow').innerHTML=[
    {cls:'m-pend',lbl:'Mis pendientes',val:p,sub:'to-dos de Lu',v:'pendientes'},
    {cls:'m-seg', lbl:'En seguimiento',val:s,sub:'esperando respuesta',v:'seguimiento'},
    {cls:'m-dec', lbl:'Decisiones abiertas',val:d,sub:'sin resolver',v:'decisiones'},
    {cls:'m-done',lbl:'Completados',val:dn,sub:'Gmail+Jira automático',v:'completados'},
  ].map(r=>`<div class="metric ${r.cls}" onclick="goViewById('${r.v}')"><div class="metric-lbl">${r.lbl}</div><div class="metric-val">${r.val}</div><div class="metric-sub">${r.sub}</div></div>`).join('');
  document.getElementById('nc-p').textContent=p;
  document.getElementById('nc-s').textContent=s;
  document.getElementById('nc-d').textContent=d;
  document.getElementById('nc-done').textContent=dn;
  document.getElementById('nc-sys').textContent=a.length;
}
function renderAgenda(){
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const evToday=CALENDAR_EVENTS.filter(e=>e.date===today&&e.everest);
  const evTomorrow=CALENDAR_EVENTS.filter(e=>e.date===tomorrow&&e.everest);
  const evAll=CALENDAR_EVENTS.filter(e=>e.everest);
  document.getElementById('nc-cal').textContent=evToday.length||0;
  let h='<div style="max-width:680px">';
  const renderEvt=ev=>{
    const l=lm(ev.label);
    const att=(ev.attendees||[]).slice(0,4).map(a=>{const n=a.split('@')[0].replace(/\./g,' ');return n;}).join(', ')+(ev.attendees.length>4?` +${ev.attendees.length-4}`:``);
    return `<div style="background:var(--surface);border:1px solid var(--border-soft);border-left:3px solid ${l.color};border-radius:10px;padding:12px 15px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);min-width:80px">${ev.start}–${ev.end}</span>
        <span style="font-weight:500;font-size:13px">${ev.title}</span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        <span class="tag" style="color:${l.color};background:${l.bg}">${l.label}</span>
        ${ev.sublabel?`<span class="tag" style="color:var(--text-secondary);background:var(--surface2)">${ev.sublabel}</span>`:''}
        <span style="font-size:10px;color:var(--text-muted);margin-left:4px">👥 ${att}</span>
      </div>
    </div>`;
  };
  if(evToday.length){h+=`<div class="sec-label">Hoy — reuniones Everest (${evToday.length})</div>${evToday.map(renderEvt).join('')}`;}
  else{h+=`<div class="sec-label">Hoy</div><div class="empty-state" style="padding:1.5rem"><div class="empty-icon">📅</div>Sin reuniones Everest hoy</div>`;}
  if(evTomorrow.length){h+=`<div class="sec-label" style="margin-top:1.25rem">Mañana — reuniones Everest (${evTomorrow.length})</div>${evTomorrow.map(renderEvt).join('')}`;}
  else{h+=`<div class="sec-label" style="margin-top:1.25rem">Mañana</div><p style="font-size:12px;color:var(--text-muted);padding:.5rem 0">Sin reuniones Everest confirmadas para mañana.</p>`;}
  if(!evToday.length&&!evTomorrow.length&&evAll.length){h+=`<div class="sec-label" style="margin-top:1.25rem">Próximas</div>${evAll.slice(0,3).map(renderEvt).join('')}`;}
  h+='</div>';
  document.getElementById('view-agenda').innerHTML=h;
}
function renderAll(){renderMetrics();renderPendientes();renderSeguimiento();renderDecisiones();renderGmail();renderJira();renderSistemas();renderCompletados();renderAgenda();}

function goView(v,el){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const m=VIEWS[v]||{};
  document.getElementById('ptitle').textContent=m.title||v;
  document.getElementById('psub').textContent=m.sub||'';
}
function goViewById(v){const el=document.querySelector(`.nav-item[onclick*="'${v}'"]`);goView(v,el);}
function onSQ(v){sq=v.toLowerCase();renderAll();}
function onFL(v){fl=v;renderAll();}
function tog(e,id){e.stopPropagation();const i=items.find(x=>x.id===id);if(!i)return;i.done=!i.done;save();renderAll();}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function initLbls(){document.getElementById('f-label').innerHTML=LABELS.map(l=>`<option value="${l.id}">${l.label}</option>`).join('');}
function onLbl(){
  const l=LABELS.find(x=>x.id===document.getElementById('f-label').value);
  const sel=document.getElementById('f-sub');
  sel.innerHTML='<option value="">—</option>'+(l&&l.subs.length?l.subs.map(s=>`<option value="${s}">${s}</option>`).join(''):'');
  updateMeetingPanel();
}
function fillMod(item){
  document.getElementById('f-desc').value=item.desc||'';
  document.getElementById('f-label').value=item.label||LABELS[0].id;
  onLbl();
  setTimeout(()=>{
    document.getElementById('f-sub').value=item.sub||'';
    updateMeetingPanel();
  },20);
  document.getElementById('f-tipo').value=item.tipo||'pendiente';
  document.getElementById('f-done').value=item.done?'1':'0';
  document.getElementById('f-due').value=item.due||'';
  document.getElementById('f-who').value=item.who||'';
  document.getElementById('f-note').value=item.note||'';
  document.getElementById('f-reunion').value=item.reunion||'';
}

// ── MEETING PANEL (modal) ─────────────────────────────────────────────────────
function updateMeetingPanel(){
  const label=document.getElementById('f-label').value;
  const sub=document.getElementById('f-sub').value;
  const panel=document.getElementById('meet-panel');
  const content=document.getElementById('mpanel-content');
  const badge=document.getElementById('mpanel-badge');
  // Find related notes
  const relNotes=MEETING_NOTES.filter(m=>m.label===label).sort((a,b)=>b.date.localeCompare(a.date));
  const subNotes=sub?relNotes.filter(m=>m.sub&&m.sub.toLowerCase().includes(sub.toLowerCase())):[];
  const showNotes=(subNotes.length?subNotes:relNotes).slice(0,3);
  // Next calendar event
  const todayStr=new Date().toISOString().slice(0,10);
  const tomorrowStr=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const nextEvt=CALENDAR_EVENTS.filter(e=>e.everest&&e.label===label&&e.date>=todayStr)
    .sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start))[0];
  if(!showNotes.length&&!nextEvt){panel.style.display='none';return;}
  panel.style.display='block';
  badge.textContent=showNotes.length+(nextEvt?'+1 hoy':'');
  const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  let h='';
  if(nextEvt){
    const isToday=nextEvt.date===todayStr;
    h+=`<div class="mpanel-next">📅 <strong>Próxima:</strong> ${isToday?'Hoy':'Mañana'} ${nextEvt.start} — ${nextEvt.title}</div>`;
  }
  if(!showNotes.length){h+=`<div class="mpanel-empty">Sin minutas previas para este tema</div>`;content.innerHTML=h;return;}
  showNotes.forEach(n=>{
    const [,pm,pd]=n.date.split('-');
    const actsHtml=n.luActions&&n.luActions.length
      ?`<div class="mpanel-acts">${n.luActions.slice(0,3).map(a=>`<div class="mpanel-act">${a}</div>`).join('')}</div>`:'';
    // Suggest contraparte based on who_map
    const whoMap=JSON.parse(localStorage.getItem('ev_who_map')||'{}');
    const suggestedWho=whoMap[label+'|'+sub]||whoMap[label+'|']||'';
    h+=`<div class="mpanel-entry">
      <div style="margin-bottom:3px"><span class="mpanel-date">${parseInt(pd)} ${MS[parseInt(pm)-1]}</span><span class="mpanel-title">${n.title}</span></div>
      ${n.keyNotes?`<div class="mpanel-notes">${n.keyNotes}</div>`:''}
      ${actsHtml}
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button class="mpanel-apply" onclick="applyMeetContext('${n.title.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${n.date}')">Aplicar contexto al ítem</button>
        ${suggestedWho&&!document.getElementById('f-who').value?`<button class="mpanel-apply" style="background:var(--surface2);color:var(--text-secondary);border-color:var(--border)" onclick="document.getElementById('f-who').value='${suggestedWho.replace(/'/g,"\\'")}';this.style.display='none'">👤 ${suggestedWho.split(' ')[0]}</button>`:''}
      </div>
    </div>`;
  });
  content.innerHTML=h;
}

function applyMeetContext(title,date){
  const note=MEETING_NOTES.find(m=>m.title===title&&m.date===date);
  if(!note)return;
  // Set reunion
  document.getElementById('f-reunion').value=title;
  // Append to note (don't overwrite)
  const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const [,pm,pd]=date.split('-');
  const dateStr=`${parseInt(pd)} ${MS[parseInt(pm)-1]}`;
  const existing=document.getElementById('f-note').value.trim();
  const parts=[`[Reunión ${dateStr}: ${title}]`];
  if(note.keyNotes)parts.push(note.keyNotes);
  if(note.luActions&&note.luActions.length)parts.push('Accionables: '+note.luActions.join('; '));
  const newNote=parts.join('\n');
  document.getElementById('f-note').value=existing?(existing+'\n---\n'+newNote):newNote;
  // Suggest who from who_map
  const label=document.getElementById('f-label').value;
  const sub=document.getElementById('f-sub').value;
  if(!document.getElementById('f-who').value){
    const whoMap=JSON.parse(localStorage.getItem('ev_who_map')||'{}');
    const suggested=whoMap[label+'|'+sub]||whoMap[label+'|']||'';
    if(suggested)document.getElementById('f-who').value=suggested;
  }
  showBanner('✓ Contexto de minuta aplicado al ítem','ok');
}

function openModal(){
  eid=null;
  document.getElementById('mtitle').textContent='Nuevo ítem';
  document.getElementById('bdel').style.display='none';
  fillMod({label:LABELS[0].id});
  document.getElementById('mbd').classList.add('open');
}
function openEdit(id){
  const item=items.find(x=>x.id===id);if(!item)return;
  eid=id;
  document.getElementById('mtitle').textContent='Editar ítem';
  document.getElementById('bdel').style.display='block';
  fillMod(item);
  document.getElementById('mbd').classList.add('open');
}
function closeMod(){document.getElementById('mbd').classList.remove('open');}
function closeBd(e){if(e.target===document.getElementById('mbd'))closeMod();}
function saveItem(){
  const desc=document.getElementById('f-desc').value.trim();if(!desc){document.getElementById('f-desc').focus();return;}
  const existing=eid?items.find(i=>i.id===eid):null;
  const label=document.getElementById('f-label').value;
  const sub=document.getElementById('f-sub').value;
  const who=document.getElementById('f-who').value.trim()||null;
  let reunion=document.getElementById('f-reunion').value.trim()||null;
  // Auto-set reunion if blank — infer from most recent matching note
  if(!reunion){
    const relNotes=MEETING_NOTES.filter(m=>m.label===label).sort((a,b)=>b.date.localeCompare(a.date));
    const match=sub?relNotes.find(m=>m.sub&&m.sub.toLowerCase().includes(sub.toLowerCase()))||relNotes[0]:relNotes[0];
    if(match)reunion=match.title;
  }
  // Learn contraparte: save who for this label+sub combo
  if(who){
    try{
      const whoMap=JSON.parse(localStorage.getItem('ev_who_map')||'{}');
      whoMap[label+'|'+sub]=who;
      localStorage.setItem('ev_who_map',JSON.stringify(whoMap));
    }catch(e){}
  }
  const item={id:eid||nid++,desc,label,sub,tipo:document.getElementById('f-tipo').value,done:document.getElementById('f-done').value==='1',due:document.getElementById('f-due').value||null,who,note:document.getElementById('f-note').value.trim()||null,reunion,source:existing?existing.source||'manual':'manual',jiraKey:existing?.jiraKey,jiraStatus:existing?.jiraStatus};
  if(eid){const idx=items.findIndex(i=>i.id===eid);if(idx>=0)items[idx]=item;}else items.push(item);
  save();closeMod();renderAll();
}
function delItem(){if(!eid)return;if(!confirm('¿Eliminar?'))return;items=items.filter(i=>i.id!==eid);save();closeMod();renderAll();}
function procesarReunion(){sendPrompt('Quiero procesar las notas de una reunión del Proyecto Everest para extraer mis pendientes. Te pego las notas ahora.');}

function init(){
  const d=new Date();
  document.getElementById('sdate').innerHTML=d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})+'<br>'+d.getFullYear();
  load();initLbls();renderAll();
}
init();
</script>
