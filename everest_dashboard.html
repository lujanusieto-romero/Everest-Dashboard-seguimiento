<head>

<title>🏔 Everest Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #21253a;
    --border: #2d3250; --accent: #6c8ef5; --accent2: #4ade80;
    --warn: #fbbf24; --danger: #f87171; --text: #e2e8f0;
    --muted: #94a3b8; --badge-new: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .sync-info { font-size: 12px; color: var(--muted); text-align: right; }
  .sync-info a { color: var(--accent); text-decoration: none; }
  main { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .card-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .count-badge { background: var(--surface2); color: var(--muted); font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .card-body { padding: 0; }
  .item { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; transition: background 0.15s; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--surface2); }
  .item-top { display: flex; align-items: flex-start; gap: 8px; }
  .item-title { font-weight: 500; flex: 1; font-size: 13px; line-height: 1.4; }
  .item-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }
  .tag-pending { background: rgba(251,191,36,0.15); color: var(--warn); }
  .tag-done { background: rgba(74,222,128,0.15); color: var(--accent2); }
  .tag-follow { background: rgba(108,142,245,0.15); color: var(--accent); }
  .tag-decision { background: rgba(248,113,113,0.15); color: var(--danger); }
  .tag-new { background: rgba(167,139,250,0.2); color: var(--badge-new); }
  .tag-label { background: var(--surface2); color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .dot-red { background: var(--danger); }
  .dot-yellow { background: var(--warn); }
  .dot-green { background: var(--accent2); }
  .dot-blue { background: var(--accent); }
  /* Calendar */
  .cal-day { padding: 10px 18px 4px; font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .cal-item { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .cal-item:last-child { border-bottom: none; }
  .cal-time { font-size: 12px; color: var(--accent); font-weight: 700; min-width: 48px; padding-top: 1px; }
  .cal-content { flex: 1; }
  .cal-title { font-weight: 500; font-size: 13px; line-height: 1.3; margin-bottom: 3px; }
  .cal-subs { font-size: 11px; color: var(--muted); }
  .conflict-warn { font-size: 10px; color: var(--danger); font-weight: 600; }
  /* Stats row */
  .stats { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-val.red { color: var(--danger); }
  .stat-val.yellow { color: var(--warn); }
  .stat-val.green { color: var(--accent2); }
  .stat-val.blue { color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .full-width { grid-column: 1 / -1; }
  .empty { color: var(--muted); font-size: 12px; padding: 20px 18px; text-align: center; }
  .section-icon { font-size: 16px; }
</style>
</head>
