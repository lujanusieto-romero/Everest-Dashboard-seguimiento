<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #23263a;
    --border: #2e3248; --text: #e2e8f0; --text2: #94a3b8;
    --accent: #6366f1; --accent2: #818cf8;
    --red: #ef4444; --yellow: #f59e0b; --green: #10b981; --blue: #3b82f6;
    --bantotal: #8b5cf6; --modelos: #06b6d4; --fps: #f97316;
    --societario: #ec4899; --gap: #84cc16; --auditoria: #f59e0b;
    --retail: #14b8a6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-left h1 span { opacity: 0.7; }
  .header-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .header-right { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sync-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; gap: 20px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
  .sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 28px; overflow-x: auto; }
  .tab { padding: 12px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); white-space: nowrap; transition: all 0.15s; user-select: none; }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .tab .badge { display: inline-block; background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; margin-left: 6px; }
  .content { padding: 24px 28px; max-width: 1200px; }
  .pane { display: none; }
  .pane.active { display: block; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; margin-top: 24px; }
  .section-title:first-child { margin-top: 0; }
  .items-grid { display: flex; flex-direction: column; gap: 8px; }
  .item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.15s; }
  .item:hover { border-color: var(--accent); }
  .item.done { opacity: 0.45; }
  .item.done .item-title { text-decoration: line-through; }
  .item-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-size: 14px; font-weight: 500; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 11px; color: var(--text2); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; }
  .pill { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .pill-type-Pendiente { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .pill-type-Seguimiento { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .pill-type-Decisión { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
  .pill-type-Done { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .pill-bantotal { background: rgba(139,92,246,0.15); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.25); }
  .pill-modelos { background: rgba(6,182,212,0.15); color: #67e8f9; border: 1px solid rgba(6,182,212,0.25); }
  .pill-fps { background: rgba(249,115,22,0.15); color: #fdba74; border: 1px solid rgba(249,115,22,0.25); }
  .pill-societario { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.25); }
  .pill-gap { background: rgba(132,204,22,0.15); color: #bef264; border: 1px solid rgba(132,204,22,0.25); }
  .pill-auditoria { background: rgba(245,158,11,0.15); color: #fde68a; border: 1px solid rgba(245,158,11,0.25); }
  .pill-retail { background: rgba(20,184,166,0.15); color: #5eead4; border: 1px solid rgba(20,184,166,0.25); }
  .badge-new { background: var(--red); color: #fff; border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 700; }
  .cal-grid { display: flex; flex-direction: column; gap: 6px; }
  .cal-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; display: flex; gap: 12px; align-items: flex-start; }
  .cal-time { font-size: 13px; font-weight: 600; color: var(--accent2); min-width: 80px; flex-shrink: 0; }
  .cal-body { flex: 1; min-width: 0; }
  .cal-title { font-size: 13px; font-weight: 500; }
  .cal-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .cal-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .day-header { font-size: 13px; font-weight: 700; color: var(--accent2); padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 120px; }
  .stat-number { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .stat-red .stat-number { color: var(--red); }
  .stat-yellow .stat-number { color: var(--yellow); }
  .stat-green .stat-number { color: var(--green); }
  .stat-blue .stat-number { color: var(--blue); }
  .empty { color: var(--text2); font-size: 13px; padding: 20px; text-align: center; background: var(--surface); border-radius: 8px; border: 1px dashed var(--border); }
  .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .status-comite { background: rgba(139,92,246,0.2); color: #c4b5fd; }
  .status-en-analisis { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .status-aprobada { background: rgba(59,130,246,0.2); color: #93c5fd; }
  .status-entregada { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  .status-cerrado { background: rgba(100,116,139,0.2); color: #94a3b8; }
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function labelClass(label) {
  const m = {
    'Bantotal':'bantotal','Modelos Contables':'modelos','FPS + FinOps + Acc Corp':'fps',
    'Societario':'societario','GAP Normativo/PwC':'gap','Auditoría/EY':'auditoria','Banco Retail':'retail'
  };
  return m[label] || 'bantotal';
}

function statusClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('comité') || l.includes('comite')) return 'status-comite';
  if (l.includes('análisis') || l.includes('analisis')) return 'status-en-analisis';
  if (l.includes('aprobada')) return 'status-aprobada';
  if (l.includes('entregada')) return 'status-entregada';
  if (l.includes('cerrado') || l.includes('done')) return 'status-cerrado';
  return 'status-en-analisis';
}

function showPane(id) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
  event.target.classList.add('active');
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderGmail() {
  const list = document.getElementById('gmailList');
  const items = SCHEDULED_GMAIL_ITEMS;
  document.getElementById('badge-gmail').textContent = items.filter(i=>!i.done).length;
  if (!items.length) { list.innerHTML = '<div class="empty">Sin novedades de Gmail en las últimas 24h</div>'; return; }

  const grouped = {};
  items.forEach(i => { (grouped[i.label] = grouped[i.label]||[]).push(i); });

  let html = '';
  for (const [label, grp] of Object.entries(grouped)) {
    html += `<div class="section-title">${label}</div><div class="items-grid">`;
    grp.forEach(item => {
      html += `
        <div class="item ${item.done?'done':''}">
          <div class="item-icon">${item.done?'✅':'📧'}</div>
          <div class="item-body">
            <div class="item-title">${item.subject} ${item.nuevo?'<span class="badge-new">NUEVO</span>':''}</div>
            <div class="item-meta">
              <span>De: ${item.sender}</span>
              <span>${fmtDate(item.date)}</span>
              <span class="pill pill-type-${item.type}">${item.type}</span>
              <span class="pill pill-${labelClass(item.label)}">${item.subLabel||item.label}</span>
            </div>
            <div style="font-size:12px;color:#94a3b8;margin-top:6px;line-height:1.5">${item.snippet}</div>
          </div>
        </div>`;
    });
    html += '</div>';
  }
  list.innerHTML = html;
}

  const open = items.filter(i=>!i.done);
  document.getElementById('badge-jira').textContent = open.length;
  if (!items.length) { list.innerHTML = '<div class="empty">Sin issues Jira activos</div>'; return; }

  const grouped = {};
  items.forEach(i => { (grouped[i.label] = grouped[i.label]||[]).push(i); });

  let html = '';
  for (const [label, grp] of Object.entries(grouped)) {
    html += `<div class="section-title">${label}</div><div class="items-grid">`;
    grp.forEach(item => {
      html += `
        <div class="item ${item.done?'done':''}">
          <div class="item-icon">${item.done?'✅':'🎯'}</div>
          <div class="item-body">
            <div class="item-title">
              <a href="${item.url}" target="_blank">${item.id}</a> — ${item.summary}
              ${item.nuevo?'<span class="badge-new">NUEVO</span>':''}
            </div>
            <div class="item-meta">
              <span class="status-pill ${statusClass(item.status)}">${item.status}</span>
              <span>👤 ${item.assignee}</span>
              <span>⏱ ${fmtDate(item.updated)}</span>
              <span class="pill pill-type-${item.type}">${item.type}</span>
              <span class="pill pill-${labelClass(item.label)}">${item.subLabel||item.label}</span>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }
  list.innerHTML = html;
}

function renderCalendar() {
  const calDiv = document.getElementById('calList');
  const hoy = CALENDAR_EVENTS.filter(e=>e.everest && e.day==='hoy');
  const manana = CALENDAR_EVENTS.filter(e=>e.everest && e.day==='mañana');
  document.getElementById('badge-cal').textContent = hoy.length + manana.length;

  function renderDay(events, label) {
    let h = `<div class="day-header">📅 ${label} — ${events.length} reunión${events.length!==1?'es':''} Everest</div><div class="cal-grid">`;
    events.forEach(ev => {
      const lc = labelClass(ev.label);
      h += `
        <div class="cal-item">
          <div class="cal-time">${ev.start}<br><span style="font-size:10px;color:#64748b">${ev.end}</span></div>
          <div class="cal-body">
            <div class="cal-title"><a href="${ev.meet}" target="_blank">${ev.title} ↗</a></div>
            <div class="cal-sub">Organiza: ${ev.organizer}</div>
            <div class="cal-pills">
              <span class="pill pill-${lc}">${ev.label}</span>
              ${ev.key_attendees.slice(0,3).map(a=>`<span style="font-size:10px;color:#64748b;padding:2px 4px">${a.split('@')[0].replace('ext_','')}</span>`).join('')}
            </div>
          </div>
        </div>`;
    });
    h += '</div>';
    return h;
  }

  let html = '';
  if (hoy.length) html += renderDay(hoy, 'Hoy Martes 26/05');
  if (manana.length) html += '<br>' + renderDay(manana, 'Mañana Miércoles 27/05');
  calDiv.innerHTML = html || '<div class="empty">Sin reuniones Everest</div>';
}

function renderResumen() {
  const pendientes = [...SCHEDULED_GMAIL_ITEMS.filter(i=>i.type==='Pendiente'&&!i.done),
                      ...SCHEDULED_JIRA_ITEMS.filter(i=>i.type==='Pendiente'&&!i.done)];
  const seguimiento = [...SCHEDULED_GMAIL_ITEMS.filter(i=>i.type==='Seguimiento'&&!i.done),
                       ...SCHEDULED_JIRA_ITEMS.filter(i=>i.type==='Seguimiento'&&!i.done)];
  const decisiones = [...SCHEDULED_GMAIL_ITEMS.filter(i=>i.type==='Decisión'&&!i.done),
                      ...SCHEDULED_JIRA_ITEMS.filter(i=>i.type==='Decisión'&&!i.done)];
  const hoyMtgs = CALENDAR_EVENTS.filter(e=>e.everest&&e.day==='hoy');

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card stat-red"><div class="stat-number">${pendientes.length}</div><div class="stat-label">🔴 Requieren acción</div></div>
    <div class="stat-card stat-yellow"><div class="stat-number">${seguimiento.length}</div><div class="stat-label">🟡 En seguimiento</div></div>
    <div class="stat-card stat-blue"><div class="stat-number">${decisiones.length}</div><div class="stat-label">🔵 Decisiones abiertas</div></div>
    <div class="stat-card stat-green"><div class="stat-number">${hoyMtgs.length}</div><div class="stat-label">📅 Reuniones hoy</div></div>
  `;

  let html = '';

  if (pendientes.length) {
    html += `<div class="section-title">🔴 Requiere acción de Lu</div><div class="items-grid">`;
    pendientes.forEach(item => {
      const title = item.subject || item.summary;
      const meta = item.sender || `${item.id} · ${item.status}`;
      html += `<div class="item"><div class="item-icon">🔴</div><div class="item-body">
        <div class="item-title">${title} <span class="badge-new">NUEVO</span></div>
        <div class="item-meta"><span>${meta}</span><span class="pill pill-type-Pendiente">Pendiente</span><span class="pill pill-${labelClass(item.label)}">${item.label}</span></div>
      </div></div>`;
    });
    html += '</div>';
  }

  if (decisiones.length) {
    html += `<div class="section-title">🔵 Decisiones abiertas</div><div class="items-grid">`;
    decisiones.forEach(item => {
      const title = item.subject || item.summary;
      html += `<div class="item"><div class="item-icon">🔵</div><div class="item-body">
        <div class="item-title">${title} <span class="badge-new">NUEVO</span></div>
        <div class="item-meta"><span>${item.id||item.sender||''}</span><span class="status-pill ${statusClass(item.status)}">${item.status||''}</span><span class="pill pill-type-Decisión">Decisión</span><span class="pill pill-${labelClass(item.label)}">${item.label}</span></div>
      </div></div>`;
    });
    html += '</div>';
  }

  if (seguimiento.length) {
    html += `<div class="section-title">🟡 Seguimiento activo (${seguimiento.length} ítems)</div><div class="items-grid">`;
    seguimiento.forEach(item => {
      const title = item.subject || item.summary;
      html += `<div class="item"><div class="item-icon">🟡</div><div class="item-body">
        <div class="item-title">${title}</div>
        <div class="item-meta">${item.id?`<span class="status-pill ${statusClass(item.status)}">${item.status}</span>`:''}${item.assignee?`<span>👤 ${item.assignee}</span>`:''}<span class="pill pill-${labelClass(item.label)}">${item.subLabel||item.label}</span></div>
      </div></div>`;
    });
    html += '</div>';
  }

  if (hoyMtgs.length) {
    html += `<div class="section-title">📅 Agenda Everest hoy</div><div class="cal-grid">`;
    hoyMtgs.forEach(ev => {
      html += `<div class="cal-item">
        <div class="cal-time">${ev.start}</div>
        <div class="cal-body"><div class="cal-title"><a href="${ev.meet}" target="_blank">${ev.title} ↗</a></div>
        <div class="cal-sub">Organiza: ${ev.organizer}</div>
        <div class="cal-pills"><span class="pill pill-${labelClass(ev.label)}">${ev.label}</span></div></div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('resumenContent').innerHTML = html;
}

function init() {
  document.getElementById('gsyncTime').textContent = fmtDate(SCHEDULED_GSYNC);
  document.getElementById('jsyncTime').textContent = fmtDate(SCHEDULED_JSYNC);
  document.getElementById('headerMeta').textContent = `Último sync: ${fmtDate(SCHEDULED_GSYNC)} · Proyecto Banco Argentina`;
  renderResumen();
  renderGmail();
  renderJira();
  renderCalendar();
}

init();
</script>
</body>
</html>
